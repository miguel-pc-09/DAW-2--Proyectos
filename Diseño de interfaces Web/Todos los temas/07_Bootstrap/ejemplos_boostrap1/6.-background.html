<!doctype html>
<html lang="es">
  <head>
    <!-- Título que aparece en la pestaña del navegador -->
    <title>Ejemplos Bootstrap - Background</title>

    <!-- Codificación de caracteres -->
    <meta charset="utf-8" />

    <!-- Configuración responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <meta http-equiv="x-ua-compatible" content="ie=edge" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>

    <style>
      /* Contenedor principal con color de fondo y altura fija */
      .contenedor {
        background-color: mediumturquoise;
        height: auto; /* Mejor usar auto para que crezca según contenido */
        padding: 20px;
      }
    </style>
  </head>

  <body>
    <!-- Título de la sección -->
    <h3 class="text-center mt-4">Ejemplos Background en Bootstrap 5</h3>

    <!-- Contenedor Bootstrap -->
    <!-- .container centra el contenido y aplica márgenes automáticos -->
    <div class="container contenedor">
      <!-- Fondo Primario            -->

      <div class="row mb-3">
        <!-- 
                bg-primary  → fondo azul principal
                text-white  → texto blanco para contraste
                p-3         → padding interno
                mb-* → Margen inferior.
                .container → Centra y limita el ancho.
                .row → Fila del sistema grid.


            -->
        <p class="bg-primary text-white p-3">Fondo primario (bg-primary)</p>
      </div>

      <!-- Fondo Secundario -->
      <div class="row mb-3">
        <p class="bg-secondary text-white p-3">
          Fondo secundario (bg-secondary)
        </p>
      </div>

      <!-- Fondo Claro -->
      <div class="row mb-3">
        <!-- 
                bg-light no necesita text-white
                se recomienda text-dark para mejor contraste
            -->
        <p class="bg-light text-dark p-3">Fondo claro (bg-light)</p>
      </div>

      <!-- Fondo Peligro -->
      <div class="row mb-3">
        <p class="bg-danger text-white p-3">Fondo peligro (bg-danger)</p>
      </div>

      <!-- Fondo Advertencia -->
      <div class="row mb-3">
        <!-- bg-warning requiere texto oscuro -->
        <p class="bg-warning text-dark p-3">Fondo advertencia (bg-warning)</p>
      </div>

      <!-- Fondo Éxito -->
      <div class="row mb-3">
        <p class="bg-success text-white p-3">Fondo éxito (bg-success)</p>
      </div>

      <!-- Fondo Información -->
      <div class="row mb-3">
        <p class="bg-info text-white p-3">Fondo información (bg-info)</p>
      </div>

      <!-- Fondo Oscuro -->
      <div class="row mb-3">
        <p class="bg-dark text-white p-3">Fondo oscuro (bg-dark)</p>
      </div>
    </div>
  </body>
</html>
