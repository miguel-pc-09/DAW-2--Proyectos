<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Ejemplo Formulario - Bootstrap</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </head>

  <body class="p-4">
    <h3>Ejemplo Formulario:</h3>

    <div class="container">
      <form>
        <!-- Primera fila: Email y Password -->
        <div class="row mb-3">
          <div class="col-md-6">
            <label for="inputEmail4" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="inputEmail4"
              placeholder="Email"
            />
          </div>
          <div class="col-md-6">
            <label for="inputPassword4" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="inputPassword4"
              placeholder="Password"
            />
          </div>
        </div>

        <!-- Direcciones -->
        <div class="mb-3">
          <label for="inputAddress" class="form-label">Dirección</label>
          <input
            type="text"
            class="form-control"
            id="inputAddress"
            placeholder="cr 27 15 14"
          />
        </div>
        <div class="mb-3">
          <label for="inputAddress2" class="form-label">Dirección 2</label>
          <input
            type="text"
            class="form-control"
            id="inputAddress2"
            placeholder="Apartamento 5 Edificio 7"
          />
        </div>

        <!-- Ciudad, Departamento y Código Postal -->
        <div class="row mb-3">
          <div class="col-md-6">
            <label for="inputCity" class="form-label">Ciudad</label>
            <input type="text" class="form-control" id="inputCity" />
          </div>
          <div class="col-md-4">
            <label for="inputState" class="form-label">Departamento</label>
            <select id="inputState" class="form-select">
              <option selected>Elegir...</option>
              <option>...</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="inputZip" class="form-label">Código Postal</label>
            <input type="text" class="form-control" id="inputZip" />
          </div>
        </div>

        <!-- Checkboxes -->
        <div class="mb-3">
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value=""
              id="check1"
            />
            <label class="form-check-label" for="check1">Opción 1</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value=""
              id="check2"
            />
            <label class="form-check-label" for="check2">Opción 2</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value=""
              id="check3"
            />
            <label class="form-check-label" for="check3">Opción 3</label>
          </div>
        </div>

        <!-- Radios -->
        <div class="mb-3">
          <div class="form-check">
            <input
              class="form-check-input"
              type="radio"
              name="gustos"
              id="radio1"
            />
            <label class="form-check-label" for="radio1">Televisión</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="radio"
              name="gustos"
              id="radio2"
            />
            <label class="form-check-label" for="radio2">Computador</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="radio"
              name="gustos"
              id="radio3"
            />
            <label class="form-check-label" for="radio3">Consola</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="radio"
              name="gustos"
              id="radio4"
            />
            <label class="form-check-label" for="radio4">Celular</label>
          </div>
        </div>

        <!-- Botón de envío -->
        <button type="submit" class="btn btn-primary">Enviar</button>
      </form>
    </div>
  </body>
</html>
