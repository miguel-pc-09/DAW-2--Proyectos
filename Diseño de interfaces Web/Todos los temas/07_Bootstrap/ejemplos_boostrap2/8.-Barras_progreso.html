<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Ejemplos Barras de Progreso Bootstrap</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div class="container my-5">
      <h3>Barras de Progreso en Bootstrap</h3>

      <!-- Barra básica al 50% -->
      <div class="progress my-3">
        <div
          class="progress-bar w-50"
          role="progressbar"
          aria-valuenow="50"
          aria-valuemin="0"
          aria-valuemax="100"
        >
          50%
        </div>
      </div>

      <!-- Barra con color y rayas (striped) al 75% -->
      <div class="progress my-3">
        <div
          class="progress-bar progress-bar-striped bg-success w-75"
          role="progressbar"
          aria-valuenow="75"
          aria-valuemin="0"
          aria-valuemax="100"
        >
          75%
        </div>
      </div>

      <!-- Barra animada (animated) al 25% con color rojo -->
      <div class="progress my-3">
        <div
          class="progress-bar progress-bar-striped progress-bar-animated bg-danger w-25"
          role="progressbar"
          aria-valuenow="25"
          aria-valuemin="0"
          aria-valuemax="100"
        >
          25%
        </div>
      </div>

      <!-- Barra múltiple: combina dos colores dentro de la misma barra -->
      <div class="progress my-3">
        <div
          class="progress-bar progress-bar-striped progress-bar-animated bg-success w-25"
          role="progressbar"
          aria-valuenow="25"
          aria-valuemin="0"
          aria-valuemax="100"
        >
          25%
        </div>
        <div
          class="progress-bar progress-bar-striped progress-bar-animated bg-danger w-75"
          role="progressbar"
          aria-valuenow="75"
          aria-valuemin="0"
          aria-valuemax="100"
        >
          75%
        </div>
      </div>
    </div>
  </body>
</html>
