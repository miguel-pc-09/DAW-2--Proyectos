<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Ejemplo Carrusel Bootstrap 5</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <!-- Estilos si es de carrusel ponerlo asi para cambiar el color -->
    <style>
      .carousel-caption h5,
      .carousel-caption p {
        color: rgb(8, 5, 5);
      }
    </style>
  </head>

  <body>
    <div class="container-fluid bg-success py-5">
      <div class="row justify-content-center">
        <div class="col-8 col-md-6 bg-secondary p-3 rounded">
          <!-- Inicio Carrusel -->
          <div id="prueba" class="carousel slide" data-bs-ride="carousel">
            <!-- Indicadores (opcional) -->
            <div class="carousel-indicators">
              <button
                type="button"
                data-bs-target="#prueba"
                data-bs-slide-to="0"
                class="active"
                aria-current="true"
              ></button>
              <button
                type="button"
                data-bs-target="#prueba"
                data-bs-slide-to="1"
              ></button>
              <button
                type="button"
                data-bs-target="#prueba"
                data-bs-slide-to="2"
              ></button>
            </div>

            <!-- Contenedor de las imágenes -->
            <div class="carousel-inner">
              <!-- Primer slide -->
              <div class="carousel-item active">
                <img src="img/img1.jpg" class="d-block w-100" alt="Imagen 1" />
                <div class="carousel-caption d-none d-md-block">
                  <h5>Primer Título</h5>
                  <p>Descripción de la primera imagen</p>
                </div>
              </div>

              <!-- Segundo slide -->
              <div class="carousel-item">
                <img src="img/img2.jpg" class="d-block w-100" alt="Imagen 2" />
                <div class="carousel-caption d-none d-md-block">
                  <h5>Segundo Título</h5>
                  <p>Descripción de la segunda imagen</p>
                </div>
              </div>

              <!-- Tercer slide -->
              <div class="carousel-item">
                <img src="img/img3.jpg" class="d-block w-100" alt="Imagen 3" />
                <div class="carousel-caption d-none d-md-block">
                  <h5>Tercer Título</h5>
                  <p>Descripción de la tercera imagen</p>
                </div>
              </div>
            </div>

            <!-- Controles -->
            <button
              class="carousel-control-prev"
              type="button"
              data-bs-target="#prueba"
              data-bs-slide="prev"
            >
              <span
                class="carousel-control-prev-icon"
                aria-hidden="true"
              ></span>
              <span class="visually-hidden">Anterior</span>
            </button>
            <button
              class="carousel-control-next"
              type="button"
              data-bs-target="#prueba"
              data-bs-slide="next"
            >
              <span
                class="carousel-control-next-icon"
                aria-hidden="true"
              ></span>
              <span class="visually-hidden">Siguiente</span>
            </button>
          </div>
          <!-- Fin Carrusel -->
        </div>
      </div>
    </div>
  </body>
</html>
