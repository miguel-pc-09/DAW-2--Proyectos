<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Ejemplos Bootstrap - Grupo de Botones</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />

    <!-- Bootstrap JS Bundle (incluye Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="p-4">
    <h3>Ejemplos de Grupo de Botones</h3>

    <!-- Grupo horizontal de botones pequeños -->
    <div class="container mb-4">
      <div class="row">
        <div
          class="btn-group btn-group-sm"
          role="group"
          aria-label="Grupo horizontal"
        >
          <button type="button" class="btn btn-success">Atlético Madrid</button>
          <button type="button" class="btn btn-success">
            Deportivo Coruña
          </button>
          <button type="button" class="btn btn-success">Real Madrid</button>
          <button type="button" class="btn btn-success">Rayo</button>
          <button type="button" class="btn btn-success">Alavés</button>
        </div>
      </div>
    </div>

    <!-- Grupo vertical de botones -->
    <div class="container mb-4">
      <p>Grupo de botones verticales:</p>
      <div class="row">
        <div
          class="btn-group-vertical"
          role="group"
          aria-label="Grupo vertical"
        >
          <button type="button" class="btn btn-primary">Atlético Madrid</button>
          <button type="button" class="btn btn-primary">
            Deportivo Coruña
          </button>
          <button type="button" class="btn btn-primary">Real Madrid</button>
          <button type="button" class="btn btn-primary">Rayo</button>
          <button type="button" class="btn btn-primary">Alavés</button>
        </div>
      </div>
    </div>

    <!-- Grupo de botones con menú desplegable -->
    <div class="container mb-4">
      <p>Grupo de botones con menú desplegable:</p>
      <div class="row">
        <div class="btn-group" role="group" aria-label="Grupo con dropdown">
          <button type="button" class="btn btn-primary">Real Madrid</button>
          <button type="button" class="btn btn-primary">Rayo</button>
          <button type="button" class="btn btn-primary">Alavés</button>

          <!-- Botón con dropdown -->
          <div class="btn-group" role="group">
            <button
              type="button"
              class="btn btn-primary dropdown-toggle"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              Equipos de Segunda
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">Deportivo Coruña</a></li>
              <li><a class="dropdown-item" href="#">Atlético Madrid</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
