<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Ejemplo Tarjetas - Bootstrap</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />

    <!-- Bootstrap JS Bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </head>

  <body class="p-4">
    <h3>Ejemplo Tarjetas:</h3>

    <div class="container">
      <!-- Tarjeta Bootstrap -->
      <div class="card w-25">
        <!-- Encabezado de la tarjeta -->
        <div class="card-header">Administrador</div>

        <!-- Imagen de la tarjeta -->
        <img
          src="img/img1.jpg"
          class="card-img-top img-fluid"
          alt="Imagen coche"
        />

        <!-- Cuerpo de la tarjeta -->
        <div class="card-body">
          <!-- Título -->
          <h5 class="card-title">Coche XXX</h5>
          <!-- Texto descriptivo -->
          <p class="card-text">Descripción del coche. Es una cochazo.</p>
          <!-- Botón de acción -->
          <a href="#" class="btn btn-primary">Ver Perfil</a>
        </div>

        <!-- Pie de la tarjeta -->
        <div class="card-footer text-muted">Ese es un pie de tarjeta</div>
      </div>
    </div>
  </body>
</html>
