<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 4 - Múltiples cambios</title>
    <style>
        .estrella {
            width: 100px;
            height: 100px;
            background-color: gold;
            margin: 100px auto;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            
            /* Animación con múltiples cambios */
            animation: brillar 2s infinite alternate;
            /* alternate hace que vaya y vuelva */
        }
        
        @keyframes brillar {
            0% {
                transform: scale(0.5) rotate(0deg);
                background-color: gold;
                opacity: 0.5;
            }
            100% {
                transform: scale(1.5) rotate(180deg);
                background-color: orange;
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="estrella"></div>
    <p>La estrella cambia de tamaño, color, rota y brilla</p>
</body>
</html>
