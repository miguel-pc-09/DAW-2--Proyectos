<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Botón Animado</title>
    <style>
      .boton-animado {
        padding: 15px 30px;
        font-size: 18px;
        background-color: #2ecc71;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .boton-animado:hover {
        background-color: #888888;
        transform: scale(1.6) rotate(80deg); /* Escala y gira el botón */
      }
    </style>
  </head>
  <body>
    <h1>Ejemplo de Botón Animado</h1>
    <button class="boton-animado">¡Haz clic aquí!</button>
    <p>Pasa el cursor sobre el botón para ver la animación.</p>
  </body>
</html>
