<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texto con Fade</title>
    <style>
        @keyframes fadeInOut {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        #texto-fade {
            font-size: 24px;
            color: #e74c3c;
            animation: fadeInOut 6s infinite;
        }
    </style>
</head>
<body>
    <h1>Ejemplo de Texto con Fade</h1>
    <p id="texto-fade">Este texto aparece y desaparece.</p>
</body>
</html>
