<!-- Cabecera -->
<div class="mb-4">
  <h2 class="fw-bold">Directivas en Angular</h2>
  <p class="text-muted">Permiten modificar el comportamiento del HTML.</p>
</div>

<div class="card shadow-sm border-0">
  <div class="card-body">
    <!-- 1. @if -->

    <h3 class="h5">1. Directiva @ if</h3>

    <!-- Botón que cambia el valor -->
    <button class="btn btn-primary mb-3" (click)="cambiarMostrar()">Mostrar / Ocultar</button>

    <!-- Angular decide si mostrar o no -->
    @if (mostrar) {
      <!-- Este bloque solo aparece si mostrar es true -->
      <p class="alert alert-success">El contenido está visible</p>
    } @else {
      <!-- Este bloque aparece si mostrar es false -->
      <p class="alert alert-danger">El contenido está oculto</p>
    }

    <hr />

    <!-- 2. @for -->

    <h3 class="h5">2. Directiva @ for</h3>

    <p>Lista de nombres:</p>

    <ul class="list-group">
      <!-- Recorre el array nombres -->
      @for (nombre of nombres; track nombre) {
        <!-- Se crea un li por cada elemento -->
        <li class="list-group-item">
          {{ nombre }}
        </li>
      }
    </ul>
  </div>
</div>
