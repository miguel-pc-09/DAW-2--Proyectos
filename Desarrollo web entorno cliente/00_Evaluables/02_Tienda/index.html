<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda de productos</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Animate -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- CSS propio -->
    <link rel="stylesheet" href="utils/css/style.css" />
  </head>

  <body>
    <!-- Barra superior -->
    <div class="barra-superior">Bienvenido a nuestra tienda</div>

    <!-- Cabecera -->
    <header class="cabecera">
      <div class="container">
        <div class="fila-cabecera">
          <h1 class="logo-tienda">MiTienda</h1>

          <div class="zona-buscador">
            <input
              type="text"
              id="buscador"
              class="input-buscador"
              placeholder="¿Qué estás buscando?"
            />
          </div>

          <div class="acciones-cabecera">
            <span>Ayuda</span>
            <span>Cuenta</span>
            <span>Carrito</span>
          </div>
        </div>

        <!-- Navbar debajo del buscador -->
        <div class="fila-menu">
          <nav class="menu-categorias">
            <button class="btn-categoria activo" data-categoria="todas">
              Todos
            </button>
            <button class="btn-categoria" data-categoria="cosmetica">
              Cosmética
            </button>
            <button class="btn-categoria" data-categoria="alimentacion">
              Alimentación
            </button>
            <button class="btn-categoria" data-categoria="muebles">
              Muebles
            </button>
          </nav>
        </div>
      </div>
    </header>

    <!-- Contenido -->
    <main class="container py-4">
      <div class="row g-4">
        <!-- Columna izquierda -->
        <div class="col-12 col-xl-9">
          <!-- Filtros -->
          <section class="bloque-filtros mb-4">
            <div class="row g-3 align-items-end">
              <div class="col-12 col-md-6 col-xl-3">
                <label for="precioMinimo" class="form-label"
                  >Precio mínimo</label
                >
                <input
                  type="number"
                  id="precioMinimo"
                  class="form-control"
                  placeholder="Ej: 20"
                  min="0"
                />
              </div>

              <div class="col-12 col-md-6 col-xl-3">
                <label for="precioMaximo" class="form-label"
                  >Precio máximo</label
                >
                <input
                  type="number"
                  id="precioMaximo"
                  class="form-control"
                  placeholder="Ej: 100"
                  min="0"
                />
              </div>

              <div class="col-12 col-md-6 col-xl-3">
                <label for="categoria" class="form-label">Categoría</label>
                <select id="categoria" class="form-select">
                  <option value="">Todas</option>
                </select>
              </div>

              <div class="col-12 col-md-6 col-xl-3">
                <label for="marca" class="form-label">Marca</label>
                <select id="marca" class="form-select">
                  <option value="">Todas</option>
                </select>
              </div>

              <div class="col-12 col-md-6 col-xl-3">
                <button id="btnFiltrar" class="btn btn-principal w-100">
                  Aplicar filtros
                </button>
              </div>

              <div class="col-12 col-md-6 col-xl-3">
                <button id="btnLimpiarFiltros" class="btn btn-secundario w-100">
                  Limpiar filtros
                </button>
              </div>

              <div class="col-12 col-md-6 col-xl-3">
                <button id="botonBajo" class="btn btn-orden w-100">
                  Menor €
                </button>
              </div>

              <div class="col-12 col-md-6 col-xl-3">
                <button id="botonAlto" class="btn btn-orden w-100">
                  Mayor €
                </button>
              </div>
            </div>
          </section>

          <!-- Productos -->
          <section>
            <h2 class="titulo-seccion" id="tituloProductos">Productos</h2>
            <div class="row g-4" id="lista-productos"></div>
          </section>
        </div>

        <!-- Carrito -->
        <div class="col-12 col-xl-3">
          <aside class="panel-carrito">
            <h2 class="titulo-seccion">Carrito</h2>

            <ul class="list-group mb-3" id="lista-carrito"></ul>

            <p id="total-carrito" class="total-carrito">Total: 0.00 €</p>

            <button class="btn btn-principal w-100 mb-2" id="btnComprarCarrito">
              Comprar
            </button>

            <button
              class="btn btn-carrito-vaciar w-100"
              id="btnEliminarCarrito"
            >
              Vaciar carrito
            </button>
          </aside>
        </div>
      </div>
    </main>

    <script src="utils/js/producto.js"></script>
    <script src="utils/js/index.js"></script>
  </body>
</html>
