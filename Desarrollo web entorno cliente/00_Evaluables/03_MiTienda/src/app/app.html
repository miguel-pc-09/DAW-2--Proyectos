<!-- Barra de navegación principal de la aplicación -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container-fluid">
    <!-- Nombre o logo de la tienda.
         Al pulsarlo me lleva a la página de inicio -->
    <a class="navbar-brand" [routerLink]="['/inicio']">TiendaApp</a>

    <!-- Botón que aparece en pantallas pequeñas para desplegar el menú -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Mostrar navegación"
    >
      <!-- Icono típico de las tres rayas del menú hamburguesa -->
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Parte del menú que se abre y se cierra en móvil -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <!-- Lista de enlaces del menú -->
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <!-- Enlace para ir al inicio -->
          <a class="nav-link" [routerLink]="['/inicio']">Inicio</a>
        </li>

        <li class="nav-item">
          <!-- Enlace para ir al listado de productos -->
          <a class="nav-link" [routerLink]="['/productos']"> Productos </a>
        </li>

        <li class="nav-item">
          <!-- Enlace para ir al carrito -->
          <a class="nav-link" [routerLink]="['/carrito']">Carrito</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Zona principal de la página.
     Aquí Angular va cargando el componente correspondiente según la ruta -->
<main class="container py-4">
  <router-outlet></router-outlet>
</main>
